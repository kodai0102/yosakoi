<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YOSAKOI PHOTO ARCHIVE</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 960px; }
      label { display: block; margin: 0.75rem 0; }
      input, select, button { font: inherit; padding: 0.4rem; }
      table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
      th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
      nav { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
      .error { color: #b00020; }
      .actions { display: flex; gap: 0.5rem; align-items: center; }
    </style>
  </head>
  <body>
    {% if current_user is defined %}
      <nav>
        <strong>{{ current_user.display_name }}</strong>
        {% if current_user.role == "admin" %}
          <a href="/admin/users">ユーザー管理</a>
          <a href="/admin/users/import">CSV登録</a>
        {% endif %}
        <form method="post" action="/logout">
          <button type="submit">ログアウト</button>
        </form>
      </nav>
    {% endif %}
    {% block content %}{% endblock %}
  </body>
</html>
