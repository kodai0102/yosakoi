<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YOSAKOI PHOTO ARCHIVE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --line: #d9dee7;
        --line-soft: #edf0f5;
        --text: #1f2937;
        --muted: #667085;
        --brand: #1d4ed8;
        --brand-strong: #1e40af;
        --danger: #b42318;
        --success-bg: #e8f5ee;
        --success-text: #17663a;
        --muted-bg: #eef1f5;
      }

      * { box-sizing: border-box; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      a { color: var(--brand); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .app-shell {
        margin: 0 auto;
        max-width: 1120px;
        padding: 24px;
      }

      .topbar {
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: flex;
        gap: 18px;
        justify-content: space-between;
        margin-bottom: 20px;
        padding: 12px 16px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-title {
        font-size: 15px;
        font-weight: 700;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .nav-links {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav-link {
        border-radius: 6px;
        color: var(--text);
        font-size: 14px;
        padding: 8px 10px;
      }

      .nav-link:hover {
        background: var(--muted-bg);
        text-decoration: none;
      }

      .page-header {
        align-items: flex-end;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 28px;
        letter-spacing: 0;
        line-height: 1.2;
        margin: 0;
      }

      .page-description {
        color: var(--muted);
        font-size: 14px;
        margin: 6px 0 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel-body { padding: 18px; }

      .toolbar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      .button,
      button {
        background: var(--brand);
        border: 1px solid var(--brand);
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        justify-content: center;
        line-height: 1.2;
        padding: 9px 12px;
      }

      .button:hover,
      button:hover {
        background: var(--brand-strong);
        text-decoration: none;
      }

      .button-secondary {
        background: #ffffff;
        border-color: var(--line);
        color: var(--text);
      }

      .button-secondary:hover {
        background: var(--muted-bg);
      }

      .button-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--brand);
        padding-left: 6px;
        padding-right: 6px;
      }

      .table-wrap { overflow-x: auto; }

      table {
        border-collapse: collapse;
        min-width: 900px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line-soft);
        font-size: 14px;
        padding: 12px 14px;
        text-align: left;
        vertical-align: middle;
      }

      th {
        background: #f8fafc;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      tbody tr:hover { background: #fbfcfe; }

      .badge {
        border-radius: 999px;
        display: inline-flex;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
      }

      .badge-success {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .badge-muted {
        background: var(--muted-bg);
        color: var(--muted);
      }

      .form-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      label {
        color: var(--text);
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-weight: 700;
        gap: 6px;
      }

      input,
      select {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 10px 11px;
        width: 100%;
      }

      input[type="checkbox"] {
        height: 18px;
        width: 18px;
      }

      .checkbox-row {
        align-items: center;
        flex-direction: row;
        gap: 8px;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .error {
        background: #fef3f2;
        border: 1px solid #fecdca;
        border-radius: 6px;
        color: var(--danger);
        padding: 10px 12px;
      }

      .login-layout {
        display: grid;
        min-height: calc(100vh - 48px);
        place-items: center;
      }

      .login-panel {
        max-width: 420px;
        width: 100%;
      }

      @media (max-width: 720px) {
        .app-shell { padding: 16px; }
        .topbar,
        .page-header {
          align-items: stretch;
          flex-direction: column;
        }
        .form-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      {% if current_user is defined %}
        <nav class="topbar">
          <div class="brand">
            <span class="brand-title">YOSAKOI PHOTO ARCHIVE</span>
            <span class="brand-subtitle">{{ current_user.display_name }} / {{ current_user.role }}</span>
          </div>
          <div class="nav-links">
            {% if current_user.role == "admin" %}
              <a class="nav-link" href="/admin/users">ユーザー管理</a>
              <a class="nav-link" href="/admin/users/import">CSV登録</a>
            {% endif %}
            <form method="post" action="/logout">
              <button class="button-secondary" type="submit">ログアウト</button>
            </form>
          </div>
        </nav>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
