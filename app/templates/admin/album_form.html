{% extends "base.html" %}

{% block page_title %}{{ "アルバム編集" if album else "アルバム作成" }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ "アルバム編集" if album else "アルバム作成" }}</h1>
    <p class="page-description">年度、イベント名、公開期間を設定します。</p>
  </div>
  <a class="button button-secondary" href="/admin/albums">一覧へ戻る</a>
</div>

<section class="panel">
  <div class="panel-body">
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ '/admin/albums/' ~ album.id if album else '/admin/albums' }}">
      <div class="form-grid">
        <label>
          年度
          <input type="number" name="year" value="{{ album.year if album else '' }}" required>
        </label>
        <label>
          イベント名
          <input type="text" name="event_name" value="{{ album.event_name if album else '' }}" required>
        </label>
        <label>
          開催日
          <input type="date" name="event_date" value="{{ album.event_date.isoformat() if album else '' }}" required>
        </label>
        <label>
          タイトル
          <input type="text" name="title" value="{{ album.title if album else '' }}" required>
        </label>
        <label>
          公開開始
          <input type="datetime-local" name="publish_from" value="{{ album.publish_from|datetime_local if album else '' }}" required>
        </label>
        <label>
          公開終了
          <input type="datetime-local" name="publish_to" value="{{ album.publish_to|datetime_local if album else '' }}" required>
        </label>
        <label>
          サムネイルパス
          <input type="text" name="thumbnail_path" value="{{ album.thumbnail_path if album and album.thumbnail_path else '' }}">
        </label>
      </div>
      <label style="margin-top: 16px;">
        説明
        <input type="text" name="description" value="{{ album.description if album and album.description else '' }}">
      </label>
      <div class="form-actions">
        <button type="submit">保存</button>
        <a class="button button-secondary" href="/admin/albums">キャンセル</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
