{% extends "base.html" %}

{% block page_title %}CSV一括登録{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>CSV一括登録</h1>
    <p class="page-description">CSVからメンバーをまとめて登録します。</p>
  </div>
  <a class="button button-secondary" href="/admin/users">一覧へ戻る</a>
</div>

<section class="panel">
  <div class="panel-body">
    <form method="post" action="/admin/users/import" enctype="multipart/form-data">
      <div class="form-grid">
        <label>
          CSVファイル
          <input type="file" name="file" accept=".csv,text/csv" required>
        </label>
        <label>
          共通初期パスワード
          <input type="password" name="initial_password" minlength="8" required>
        </label>
      </div>
      <div class="form-actions">
        <button type="submit">登録</button>
      </div>
    </form>

    {% if result %}
      <div class="toolbar" style="margin-top: 18px;">
        <strong>登録結果</strong>
      </div>
      <div class="table-wrap">
        <table>
          <tbody>
            <tr><th>作成</th><td>{{ result.created_count }}</td></tr>
            <tr><th>スキップ</th><td>{{ result.skipped_count }}</td></tr>
            <tr><th>エラー</th><td>{{ result.errors | length }}</td></tr>
          </tbody>
        </table>
      </div>
    {% endif %}
  </div>
</section>
{% endblock %}
