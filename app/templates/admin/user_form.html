{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ "ユーザー編集" if user else "ユーザー作成" }}</h1>
    <p class="page-description">ログインID、権限、利用期間を設定します。</p>
  </div>
  <a class="button button-secondary" href="/admin/users">一覧へ戻る</a>
</div>

<section class="panel">
  <div class="panel-body">
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ '/admin/users/' ~ user.id if user else '/admin/users' }}">
      <div class="form-grid">
        {% if not user %}
          <label>
            ログインID
            <input type="text" name="login_id" required>
          </label>
        {% endif %}
        <label>
          表示名
          <input type="text" name="display_name" value="{{ user.display_name if user else '' }}" required>
        </label>
        <label>
          パスワード{% if user %}（変更する場合のみ）{% endif %}
          <input type="password" name="password" {% if not user %}required{% endif %}>
        </label>
        <label>
          権限
          <select name="role" required>
            <option value="member" {% if user and user.role == "member" %}selected{% endif %}>member</option>
            <option value="admin" {% if user and user.role == "admin" %}selected{% endif %}>admin</option>
          </select>
        </label>
        <label>
          利用開始日時
          <input type="datetime-local" name="valid_from" value="{{ user.valid_from.strftime('%Y-%m-%dT%H:%M') if user else '' }}" required>
        </label>
        <label>
          利用終了日時
          <input type="datetime-local" name="valid_to" value="{{ user.valid_to.strftime('%Y-%m-%dT%H:%M') if user else '' }}" required>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" name="is_active" value="true" {% if not user or user.is_active %}checked{% endif %}>
          有効
        </label>
      </div>
      <div class="form-actions">
        <button type="submit">保存</button>
        <a class="button button-secondary" href="/admin/users">キャンセル</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
