{% extends "base.html" %}

{% block page_title %}タグ管理{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>タグ管理</h1>
    <p class="page-description">検索や写真整理に使うタグを確認します。</p>
  </div>
  <button type="button">タグ作成</button>
</div>

<section class="panel">
  <div class="panel-body">
    <div class="toolbar">
      <input aria-label="タグ検索" placeholder="タグ名で検索">
      <span class="meta">{{ tags | length }}件</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>タグ名</th>
            <th>利用写真数</th>
            <th>作成日</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {% for tag in tags %}
            <tr>
              <td><span class="tag-pill">{{ tag }}</span></td>
              <td>{{ loop.index * 12 }}枚</td>
              <td>2026-06-13</td>
              <td>
                <div class="nav-links">
                  <button class="button-secondary" type="button">編集</button>
                  <button class="button-secondary" type="button">統合</button>
                </div>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
