{% extends "base.html" %}

{% block page_title %}写真詳細{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>写真詳細</h1>
    <p class="page-description">{{ album.title }} - {{ photo.file_name }}</p>
  </div>
  <a class="button button-secondary" href="/albums/{{ album.id }}">写真一覧へ</a>
</div>

<div class="photo-detail-layout">
  <section class="photo-hero">
    <img src="{{ photo.media_url }}" alt="{{ photo.file_name }}">
  </section>
  <aside class="panel">
    <div class="panel-body">
      <div class="toolbar">
        <form method="post" action="/photos/{{ photo.id }}/favorite">
          <button class="button-secondary" type="submit">♡ お気に入り</button>
        </form>
        <form method="post" action="/photos/{{ photo.id }}/download">
          <button type="submit">⇩ ダウンロード</button>
        </form>
      </div>
      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">撮影日</span>
          <span>{{ photo.taken_at_label }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">ファイル名</span>
          <span>{{ photo.file_name }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">サイズ</span>
          <span>{{ photo.file_size }} bytes</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Content-Type</span>
          <span>{{ photo.content_type }}</span>
        </div>
      </div>
    </div>
  </aside>
</div>
{% endblock %}
