{% extends "base.html" %}

{% block page_title %}お気に入り{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>お気に入り</h1>
    <p class="page-description">後から見返したい写真をまとめて確認できます。</p>
  </div>
</div>

<div class="photo-grid">
  {% for photo in photos %}
    <div class="favorite-card">
      <a class="photo-tile" href="/photos/{{ photo.id }}">
        <img src="{{ photo.thumbnail_url }}" alt="{{ photo.file_name }}">
      </a>
      <form method="post" action="/photos/{{ photo.id }}/favorite">
        <input type="hidden" name="redirect_to" value="/favorites">
        <button class="favorite-remove" type="submit" aria-label="お気に入り解除">♥</button>
      </form>
    </div>
  {% endfor %}
</div>
{% if not photos %}
  <p class="empty-state">お気に入りに登録された写真はまだありません。</p>
{% endif %}
{% endblock %}
