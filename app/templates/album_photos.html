{% extends "base.html" %}

{% block page_title %}{{ album.title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ album.title }}</h1>
    <p class="page-description">{{ album.period }} / {{ album.count }}枚</p>
  </div>
  <a class="button button-secondary" href="/albums">アルバム一覧へ</a>
</div>

<div class="toolbar">
  <div class="tag-list">
    <span class="tag-pill">写真一覧</span>
    <span class="tag-pill">情報</span>
  </div>
  <div class="nav-links">
    <button class="button-secondary" type="button">絞り込み</button>
    <button class="button-secondary" type="button">並び替え</button>
  </div>
</div>

<div class="photo-grid">
  {% for photo in photos %}
    <div class="photo-card">
      <a class="photo-tile" href="/photos/{{ photo.id }}" aria-label="{{ photo.file_name }}">
        <img src="{{ photo.thumbnail_url }}" alt="{{ photo.file_name }}">
      </a>
      <form method="post" action="/photos/{{ photo.id }}/favorite">
        <input type="hidden" name="redirect_to" value="/albums/{{ album.id }}">
        <button
          class="photo-favorite-button {% if photo.is_favorite %}is-active{% endif %}"
          type="submit"
          aria-label="{{ 'お気に入り解除' if photo.is_favorite else 'お気に入りに追加' }}"
        >
          {{ '♥' if photo.is_favorite else '♡' }}
        </button>
      </form>
    </div>
  {% endfor %}
</div>
{% if not photos %}
  <p class="empty-state">このアルバムにはまだ写真がありません。</p>
{% endif %}
{% endblock %}
