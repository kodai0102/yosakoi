{% extends "base.html" %}

{% block content_public %}
<div class="login-page">
  <section class="panel login-card">
    <div class="panel-body">
      <div class="login-brand">
        <span class="brand-mark">Y</span>
        <span class="brand-title">トキ</span>
        <span class="brand-subtitle">チーム写真共有システム</span>
      </div>
      <h1 style="font-size: 20px; text-align: center; margin-bottom: 22px;">ログイン</h1>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label>
          ログインID
          <input type="text" name="login_id" required autocomplete="username">
        </label>
        <label>
          パスワード
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <div class="form-actions">
          <button type="submit" style="width: 100%;">ログイン</button>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}
