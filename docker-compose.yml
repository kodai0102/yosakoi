services:
  app:
    build: .
    container_name: yosakoi_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: yosakoi_db
    environment:
      POSTGRES_DB: yosakoi
      POSTGRES_USER: yosakoi
      POSTGRES_PASSWORD: yosakoi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yosakoi -d yosakoi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
